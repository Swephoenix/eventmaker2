name: eventmaker2

services:
  db:
    image: mariadb:10.11
    container_name: nc-eventplaner-db
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: nextcloud_root
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - ${PERSISTENT_DATA_ROOT:-/mnt/data/projects/data/eventmaker2}/mariadb:/var/lib/mysql

  nextcloud:
    build:
      context: ..
      dockerfile: app-nextcloud/Dockerfile
    image: nc-eventplaner-nextcloud:local
    container_name: nc-eventplaner
    depends_on:
      - db
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin123
      NEXTCLOUD_TRUSTED_DOMAINS: localhost 127.0.0.1
      MYSQL_HOST: db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: nextcloud
    volumes:
      - ${PERSISTENT_DATA_ROOT:-/mnt/data/projects/data/eventmaker2}/nextcloud:/var/www/html

  nextcloud-init:
    image: nc-eventplaner-nextcloud:local
    depends_on:
      - db
      - nextcloud
    restart: "no"
    environment:
      OC_PASS: DemoUser123!
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        set -euo pipefail

        occ() {
          su -s /bin/bash www-data -c "php /var/www/html/occ $*"
        }

        echo "Waiting for Nextcloud installation..."
        until [ -f /var/www/html/config/config.php ]; do
          sleep 5
        done

        until occ status 2>/dev/null | grep -q "installed: true"; do
          sleep 5
        done

        echo "Syncing custom app into active Nextcloud volume..."
        TMP_API_EVENTS_FILE="/tmp/booked_events_widget_api_events.json"
        TMP_MANUAL_STATE_FILE="/tmp/booked_events_widget_manual_state.json"
        TMP_LEGACY_EVENTS_FILE="/tmp/booked_events_widget_legacy_events.json"
        if [ -f /var/www/html/custom_apps/booked_events_widget/data/api_events.json ]; then
          cp /var/www/html/custom_apps/booked_events_widget/data/api_events.json "$$TMP_API_EVENTS_FILE"
        fi
        if [ -f /var/www/html/custom_apps/booked_events_widget/data/manual_state.json ]; then
          cp /var/www/html/custom_apps/booked_events_widget/data/manual_state.json "$$TMP_MANUAL_STATE_FILE"
        fi
        if [ -f /var/www/html/custom_apps/booked_events_widget/data/events.json ]; then
          cp /var/www/html/custom_apps/booked_events_widget/data/events.json "$$TMP_LEGACY_EVENTS_FILE"
        fi

        mkdir -p /var/www/html/custom_apps
        chown www-data:www-data /var/www/html/custom_apps
        rm -rf /var/www/html/custom_apps/booked_events_widget
        cp -a /usr/src/nextcloud/custom_apps/booked_events_widget /var/www/html/custom_apps/booked_events_widget
        if [ -f "$$TMP_API_EVENTS_FILE" ]; then
          mkdir -p /var/www/html/custom_apps/booked_events_widget/data
          mv "$$TMP_API_EVENTS_FILE" /var/www/html/custom_apps/booked_events_widget/data/api_events.json
        fi
        if [ -f "$$TMP_MANUAL_STATE_FILE" ]; then
          mkdir -p /var/www/html/custom_apps/booked_events_widget/data
          mv "$$TMP_MANUAL_STATE_FILE" /var/www/html/custom_apps/booked_events_widget/data/manual_state.json
        fi
        if [ -f "$$TMP_LEGACY_EVENTS_FILE" ]; then
          mkdir -p /var/www/html/custom_apps/booked_events_widget/data
          mv "$$TMP_LEGACY_EVENTS_FILE" /var/www/html/custom_apps/booked_events_widget/data/events.json
        fi
        chown -R www-data:www-data /var/www/html/custom_apps

        echo "Enabling dashboard widget app..."
        occ app:disable booked_events_widget || true
        occ app:enable booked_events_widget

        echo "Creating demo user if needed..."
        if ! occ user:info demo >/dev/null 2>&1; then
          su -s /bin/bash www-data -c "OC_PASS=$$OC_PASS php /var/www/html/occ user:add --password-from-env --display-name='Demo User' demo"
        fi

        echo "Configuring default landing page and dashboard layout..."
        occ config:app:set core defaultpage --value=/apps/dashboard/
        occ config:app:set dashboard layout --value=booked_events_widget-events,calendar,files
        occ user:setting demo dashboard layout booked_events_widget-events,calendar,files

        echo "Initialization complete."
    volumes:
      - ${PERSISTENT_DATA_ROOT:-/mnt/data/projects/data/eventmaker2}/nextcloud:/var/www/html

  events-updater:
    image: nc-eventplaner-nextcloud:local
    depends_on:
      - db
      - nextcloud
    restart: unless-stopped
    user: "33:33"
    command:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail

        occ() {
          php /var/www/html/occ "$$@"
        }

        echo "Waiting for Nextcloud installation before updating events..."
        until [ -f /var/www/html/config/config.php ]; do
          sleep 5
        done

        until occ status 2>/dev/null | grep -q "installed: true"; do
          sleep 5
        done

        while true; do
          echo "Updating event feed..."
          /usr/local/bin/getevent.sh /var/www/html/custom_apps/booked_events_widget/data/api_events.json || true
          sleep 1800
        done
    volumes:
      - ${PERSISTENT_DATA_ROOT:-/mnt/data/projects/data/eventmaker2}/nextcloud:/var/www/html
